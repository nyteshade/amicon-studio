name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-Foundation core: builds and runs the full round-trip / format test
  # suite on Linux. The whole package builds here too — the macOS-only app
  # compiles to its trivial stub and the CLI prints a notice.
  linux:
    name: Linux (Swift 6.1)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # The real check for the macOS / SwiftUI code that can't compile on Linux:
  # builds every target (incl. the SwiftUI document app and the ImageIO CLI)
  # and runs the tests with the macOS SDK available.
  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (all targets, incl. SwiftUI app + CLI)
        run: swift build
      - name: Test
        run: swift test
      # Xcode's explicit-modules build is stricter than `swift build` (e.g. it
      # rejects some cross-type file-private access). Build the app scheme the
      # way Xcode does, for macOS, so that path is covered too.
      - name: Xcode build (app scheme, macOS)
        run: |
          set -o pipefail
          xcodebuild -scheme AmigaIconWriterApp -destination 'platform=macOS' build | tail -50

  # Xcode 26 / Swift 6.2 lane: the only place the explicit Liquid Glass code
  # (`.buttonStyle(.glass)`, `.glassEffect()`, gated behind `#if compiler(>=6.2)`
  # + `if #available(macOS 26, *)`) actually compiles. The macos-14 lane above
  # excludes it; this one proves it builds under the new SDK. Allowed to fail
  # until the runner image reliably ships Xcode 26, so it never blocks the rest.
  macos26:
    name: macOS (Xcode 26 / Liquid Glass)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Versions
        run: |
          swift --version
          xcodebuild -version
      - name: Build (all targets)
        run: swift build
      - name: Xcode build (app scheme, macOS)
        run: |
          set -o pipefail
          xcodebuild -scheme AmigaIconWriterApp -destination 'platform=macOS' build | tail -50
